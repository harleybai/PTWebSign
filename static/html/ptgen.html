<!DOCTYPE html>
<html>

<head>
    <title>Parse Video Link</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.staticfile.org/twitter-bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">

    <style type="text/css">
        html {
            position: relative;
            min-height: 100%;
        }

        body {
            padding-top: 50px;
            margin-bottom: 40px;
            background-color: #D0D0D0;
        }

        .navbar-fixed-top {
            border: 0;
        }

        .footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: #f5f5f5;
        }

        .container {
            width: auto;
            padding: 0 15px;
        }

        .zero-clipboard {
            position: relative;
        }

        .btn-clipboard {
            position: absolute;
            top: 8px;
            right: 21px;
            z-index: 10;
            display: block;
            padding: 5px 8px;
            font-size: 12px;
            color: #767676;
            cursor: pointer;
            background-color: #fff;
            border: 1px solid #e1e1e8;
            border-radius: 0 4px 0 4px;
        }
    </style>
</head>

<body>
    <!-- <script src="https://cdn.staticfile.org/jquery/2.1.1/jquery.min.js"></script>
    <script src="https://cdn.staticfile.org/twitter-bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src="https://cdn.bootcss.com/clipboard.js/2.0.4/clipboard.min.js"></script> -->
    <script src="../js/jquery.min.js"></script>
    <script src="../js/bootstrap.min.js"></script>
    <script src="../js/clipboard.min.js"></script>

    <nav class="navbar navbar-inverse navbar-fixed-top" style="background-color: #f5f5f5">
        <div class="container-fluid">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar"
                    aria-expanded="false" aria-controls="navbar">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="/">PT Sign In</a>&nbsp;&nbsp;&nbsp;
                <a class="navbar-brand" href="/playlist">Play List</a>&nbsp;&nbsp;&nbsp;
                <a class="navbar-brand" href="/video">Parse Video Link</a>
                <a class="navbar-brand" href="/ptsearch">PT Search</a>
                <a class="navbar-brand" href="#">PT Gen</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid" style="padding-top: 50px;">
        <div class="row">
            <div class="col-sm-8 col-sm-offset-2 col-md-6 col-md-offset-3">
                <div class="form-inline">
                    <div class="form-group" style="width: 50%;">
                        <input type="text" class="form-control" style="width: 100%;" id="input_value" autofocus />
                    </div>
                    <div class="checkbox">
                        <label><input type="checkbox" id="poster">Poster</label>
                    </div>
                    <button class="btn btn-success" id="query_btn">查询</button>
                </div>
                <font class="medium">填写来自 <strong><a href="https://www.imdb.com">IMDb</a> / <a
                            href="https://movie.douban.com">豆瓣</a> / <a
                            href="https://www.themoviedb.org/?language=zh-CN">TMDB</a> / <a
                            href="https://store.steampowered.com">Steam</a> / <a
                            href="https://indienova.com">Indienova</a>
                        / <a href="https://www.epicgames.com/store/zh-CN/">Epic</a> / <a
                            href="https://bangumi.tv/">Bangumi</a></strong> 的链接</font>
                <br>
            </div>
            <div class="col-sm-8 col-sm-offset-2 col-md-6 col-md-offset-3">
                <hr>
            </div>
            <div id="gen_help" class="col-sm-8 col-sm-offset-2 col-md-6 col-md-offset-3" style="display: none">
            </div>
            <div id="gen_out" class="col-sm-8 col-sm-offset-2 col-md-6 col-md-offset-3">
                <div class="zero-clipboard">
                    <button class="btn btn-clipboard" data-clipboard-target="#movie_info"
                        id="movie_info_copy">复制</button>
                </div>
                <textarea class="form-control" rows=22 id="movie_info"></textarea>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="container">
            <div class="navbar-collapse collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="https://github.com/harleybai/PTWebSign" target="_blank">Powered By @harleybai</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script>
        $('#input_value').keypress(function (e) {
            if (e.which === 13 || e.keyCode === 13) { // 检查是否按下回车键（keyCode 13）
                $('#query_btn').click();
                e.preventDefault();// 阻止默认的表单提交行为
                return false;
            }
        });
        $("#query_btn").click(function () {
            let input = $("#input_value").val();
            $.getJSON('https://ptgen.tju.pt/infogen?url=' + input, function (data) {
                if (data.format) {
                    let info = data['format'] + "\n\n"
                    if (!$("#poster").prop('checked')) {
                        info = info.replace(/\[img\].*?\[\/img\]/, '');
                    }
                    $("#movie_info").text(info);
                    $("#movie_info_copy").click();
                    $("#input_value").val('');
                    $("#input_value").focus();
                }
            })
        });
        // 页面复制相关
        new ClipboardJS('.btn-clipboard');
    </script>
</body>

</html>
